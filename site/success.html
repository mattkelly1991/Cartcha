<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cartcha — access granted</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: radial-gradient(1000px 500px at 50% -10%, #e7f7ee, #fff 60%); color: #1b1b1f; }
    .card { text-align: center; padding: 48px 40px; background: #fff; border: 1px solid #e8eaed; border-radius: 16px; box-shadow: 0 14px 40px rgba(0,0,0,0.08); max-width: 440px; }
    .mark { width: 72px; height: 72px; margin: 0 auto 18px; border-radius: 50%; background: #1aa260; display: grid; place-items: center; }
    .mark::after { content: ""; width: 18px; height: 34px; border: solid #fff; border-width: 0 6px 6px 0; transform: rotate(45deg) translate(-2px, -3px); }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { margin: 0 0 6px; color: #5f6368; font-size: 15px; line-height: 1.5; }
    .deny .mark { background: #d93025; }
    .deny .mark::after { content: "\00d7"; border: 0; width: auto; height: auto; transform: none; color: #fff; font-size: 46px; line-height: 1; }
    a { color: #4a90d9; display: inline-block; margin-top: 18px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root" class="card">
    <div class="mark"></div>
    <h1>Checking credential…</h1>
    <p>Validating your Cartcha pass.</p>
  </div>
  <script>
    (function () {
      var root = document.getElementById('root');
      function fail(title, msg) {
        root.className = 'card deny';
        root.innerHTML = '<div class="mark"></div><h1>' + title + '</h1><p>' + msg + '</p>' +
          '<a href="index.html">← Back to the gate</a>';
      }
      var token = new URLSearchParams(location.search).get('token');
      var raw = sessionStorage.getItem('cartcha_pass');
      sessionStorage.removeItem('cartcha_pass'); // one-shot
      if (!token || !raw) return fail('Access denied', 'No valid Cartcha credential was presented.');
      try {
        var pass = JSON.parse(raw);
        if (pass.token === token && pass.exp > Date.now()) {
          root.innerHTML = '<div class="mark"></div><h1>Access granted</h1>' +
            '<p>You passed Cartcha — verified as an AI, not a human or a script.</p>' +
            '<p>This page is gated behind a valid one-time credential.</p>' +
            '<a href="index.html">← Run it again</a>';
        } else {
          fail('Access denied', 'That credential is invalid or expired.');
        }
      } catch (e) {
        fail('Access denied', 'Could not validate the credential.');
      }
    })();
  </script>
</body>
</html>
